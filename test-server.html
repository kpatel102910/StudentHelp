<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
        .test-btn:hover { background: #0056b3; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Server Connection Test</h1>
    
    <button class="test-btn" onclick="testServer()">Test Server Connection</button>
    <button class="test-btn" onclick="testSubmission()">Test Submission</button>
    
    <div id="status"></div>

    <script>
        const API_BASE = 'http://localhost:3000';
        
        async function testServer() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status info">Testing server connection...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/submissions`);
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `<div class="status success">✅ Server is running! Found ${Array.isArray(data) ? data.length : (data.submissions ? data.submissions.length : 0)} submissions</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ Server responded with error: ${response.status}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Cannot connect to server: ${error.message}</div>`;
            }
        }
        
        async function testSubmission() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status info">Testing submission...</div>';
            
            const testSubmission = {
                type: 'request',
                name: 'Test Student',
                subject: 'math',
                topic: 'Test Topic',
                description: 'This is a test submission to verify the server is working correctly.'
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/submissions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testSubmission)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    statusDiv.innerHTML = `<div class="status success">✅ Test submission successful! ID: ${result.id}</div>`;
                } else {
                    const errorText = await response.text();
                    statusDiv.innerHTML = `<div class="status error">❌ Test submission failed: ${response.status} - ${errorText}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Test submission error: ${error.message}</div>`;
            }
        }
        
        // Auto-test on load
        window.onload = () => {
            testServer();
        };
    </script>
</body>
</html>
