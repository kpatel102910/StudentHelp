<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Debug Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
        .test-btn:hover { background: #0056b3; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .code { background: #f8f9fa; padding: 10px; border-radius: 4px; margin: 10px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Supabase Connection Debug</h1>
    
    <button class="test-btn" onclick="testSupabaseConnection()">Test Supabase Connection</button>
    <button class="test-btn" onclick="testSubmission()">Test Submission</button>
    <button class="test-btn" onclick="testFetch()">Test Fetch</button>
    
    <div id="status"></div>

    <script>
        // Your Supabase credentials
        const SUPABASE_URL = 'https://ctjskblszxlwqyfefblx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pmxjlbhs3YyQ5Ylc7Auqcw_PA9vQKZE';
        
        let supabase = null;
        
        // Initialize Supabase
        function initSupabase() {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized:', supabase);
                return true;
            } catch (error) {
                console.error('Supabase initialization error:', error);
                return false;
            }
        }
        
        async function testSupabaseConnection() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status info">Testing Supabase connection...</div>';
            
            if (!initSupabase()) {
                statusDiv.innerHTML = '<div class="status error">❌ Failed to initialize Supabase</div>';
                return;
            }
            
            try {
                // Test basic connection
                const { data, error } = await supabase
                    .from('submissions')
                    .select('count')
                    .single();
                
                if (error) {
                    statusDiv.innerHTML = `<div class="status error">❌ Connection failed: ${error.message}</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="status success">✅ Supabase connected! Found ${data.count} submissions</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Connection error: ${error.message}</div>`;
            }
        }
        
        async function testSubmission() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status info">Testing submission...</div>';
            
            if (!initSupabase()) {
                statusDiv.innerHTML = '<div class="status error">❌ Supabase not initialized</div>';
                return;
            }
            
            const testSubmission = {
                submission_type: 'request',
                name: 'Test Student',
                subject: 'math',
                topic: 'Test Topic',
                description: 'This is a test submission to debug Supabase.'
            };
            
            try {
                const { data, error } = await supabase
                    .from('submissions')
                    .insert([testSubmission])
                    .select();
                
                if (error) {
                    statusDiv.innerHTML = `<div class="status error">❌ Submission failed: ${error.message}</div>`;
                    console.error('Supabase error details:', error);
                } else {
                    statusDiv.innerHTML = `<div class="status success">✅ Submission successful! ID: ${data[0].id}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Submission error: ${error.message}</div>`;
                console.error('Submission error details:', error);
            }
        }
        
        async function testFetch() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="status info">Testing fetch...</div>';
            
            if (!initSupabase()) {
                statusDiv.innerHTML = '<div class="status error">❌ Supabase not initialized</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('submissions')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);
                
                if (error) {
                    statusDiv.innerHTML = `<div class="status error">❌ Fetch failed: ${error.message}</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="status success">✅ Fetch successful! Found ${data.length} submissions</div>`;
                    console.log('Fetched data:', data);
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Fetch error: ${error.message}</div>`;
                console.error('Fetch error details:', error);
            }
        }
        
        // Auto-test on load
        window.onload = () => {
            testSupabaseConnection();
        };
    </script>
</body>
</html>
